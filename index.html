<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lain · Portfolio</title>
<style>
@font-face {
  font-family: 'FeihuaSongti';
  src: url('fonts/飞花宋体.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg: #0a0704;
  --surface: #0d0a06;
  --ink: #f0e6d3;
  --accent: #c4a882;
  --muted: #8a8279;
  --line: rgba(196,168,130,0.12);
  --glow-amber: rgba(180,120,60,0.14);
  --font-display: 'FeihuaSongti', 'Noto Serif SC', 'Songti SC', serif;
  --font-body: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  --max-width: 1200px;
  --side-padding: 48px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.section {
  position: relative;
  padding: 120px var(--side-padding);
  max-width: var(--max-width);
  margin: 0 auto;
}

.section-header {
  margin-bottom: 64px;
}

.section-eyebrow {
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 3.5vw, 48px);
  line-height: 1.15;
  color: var(--ink);
}

.section-divider {
  border: none;
  border-top: 0.5px solid var(--line);
  margin: 0;
}

.tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  border: 0.5px solid rgba(196,168,130,0.3);
  color: var(--accent);
  border-radius: 2px;
}

.card {
  background: rgba(196,168,130,0.03);
  border: 0.5px solid var(--line);
  border-radius: 4px;
  padding: 28px;
  transition: border-color 0.3s;
}
.card:hover { border-color: rgba(196,168,130,0.25); }

.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 16px var(--side-padding);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,7,4,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 0.5px solid var(--line);
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: 0.04em;
}

.nav-links { display: flex; gap: 28px; }
.nav-links a {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--ink); }
</style>
</head>
<body>
<nav class="nav">
  <a href="#" class="nav-logo">Lain</a>
  <div class="nav-links">
    <a href="#work">Work</a>
    <a href="#channels">Channels</a>
    <a href="#ai">AI</a>
    <a href="#about">About</a>
  </div>
</nav>
<script>
// JS goes here
</script>
</body>
</html>
